<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function(){
  var t=localStorage.getItem("dg_theme")||"dark";
  document.documentElement.setAttribute("data-theme",t);
})();
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판별 결과 공유 — DeepGuard Pro</title>
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%23060b13%22/><path d=%22M16 6 L26 11 V17 C26 22 21 26 16 28 C11 26 6 22 6 17 V11 Z%22 fill=%22none%22 stroke=%22%2300c8ff%22 stroke-width=%222%22/><circle cx=%2216%22 cy=%2218%22 r=%223%22 fill=%22%2300c8ff%22/><line x1=%2216%22 y1=%2212%22 x2=%2216%22 y2=%2215%22 stroke=%22%2300c8ff%22 stroke-width=%222%22/></svg>" />
  <!-- styles from main.css -->
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a href="./index.html" class="nav__logo">
      <div class="nav__logo-mark">
        <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L14 5v6L8 14 2 11V5L8 2z" stroke="#000" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="#000"/></svg>
      </div>
      Deep<span>Guard</span>&nbsp;Pro
    </a>
    <ul class="nav__links">
      <li><a href="./index.html"     class="nav__link">분석</a></li>
      <li><a href="./history.html"   class="nav__link">기록</a></li>
      <li><a href="./community.html" class="nav__link">커뮤니티</a></li>
    </ul>
    <div class="nav__status"><span class="status-dot"></span><span>AI 엔진 온라인</span></div>
  
  <button class="theme-toggle" id="theme-toggle-btn" aria-label="테마 전환" title="라이트/다크 전환">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
        <!-- Mobile hamburger -->
  <button class="nav__hamburger" id="nav-hamburger" aria-label="메뉴 열기">
    <span></span><span></span><span></span>
  </button>
</div><!-- end nav__inner -->

<!-- Mobile drawer (injected by nav) -->
<div class="nav__mobile-drawer" id="nav-mobile-drawer">
  <a href="./index.html">분석</a>
  <a href="./history.html">기록</a>
  <a href="./community.html">커뮤니티</a>
  <a href="./admin-login.html">관리자 <span class="nav__badge" style="font-size:.55rem">ADM</span></a>
</div>
</nav>

<main>
  <div id="share-root" class="share-wrap">
    <div class="share-loading">
      <div class="status-dot" style="width:12px;height:12px;margin:0 auto 16px;animation:pulse-dot 1.2s infinite"></div>
      <p>공유 결과를 불러오는 중...</p>
    </div>
  </div>
</main>

<script src="./env.js"></script>
<script src="./js/core.js"></script>
<script>
(function () {
  'use strict';
  const { API, verdictMeta, fmtDate, fmtTime, confidenceColor } = window.DG;

  const token = new URLSearchParams(location.search).get('token');
  const root  = document.getElementById('share-root');

  if (!token) {
    showError('유효하지 않은 링크입니다', '공유 링크에 토큰이 포함되어 있지 않습니다.');
    return;
  }

  /* ── 데이터 로드 ───────────────────────────────────────────── */
  API.get(`/share/${token}`).then(post => {
    render(post);
  }).catch(e => {
    showError('결과를 불러올 수 없습니다', e.message || '링크가 만료되었거나 삭제된 게시물입니다.');
  });

  /* ── 에러 표시 ─────────────────────────────────────────────── */
  function showError(title, msg) {
    root.innerHTML = `
      <div class="error-box fade-up">
        <svg class="error-box__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <h2>${title}</h2>
        <p>${msg}</p>
        <a href="./community.html" style="display:inline-block;margin-top:20px;color:var(--clr-accent);font-size:.875rem">커뮤니티로 돌아가기 →</a>
      </div>`;
  }

  /* ── 신뢰도 색상 ───────────────────────────────────────────── */
  function confColor(v) {
    if (v >= 0.68) return 'var(--clr-danger)';
    if (v >= 0.38) return 'var(--clr-warn)';
    return 'var(--clr-safe)';
  }

  /* ── 스파크라인 ────────────────────────────────────────────── */
  function buildSparkline(scores, W=640, H=88) {
    if (!scores || scores.length < 2) return '';
    const P={t:10,b:20,l:36,r:12}, cw=W-P.l-P.r, ch=H-P.t-P.b, n=scores.length;
    const px=i=>P.l+(n>1?(i/(n-1))*cw:cw/2);
    const py=v=>P.t+ch-v*ch;
    const linePts=scores.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
    const areaPts=[...scores.map((v,i)=>`${px(i)},${py(v)}`),`${px(n-1)},${P.t+ch}`,`${px(0)},${P.t+ch}`].join(' ');
    const thY=py(0.68);
    const yLabels=[0,0.25,0.5,0.68,1.0];
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px;display:block">
  <defs><linearGradient id="shg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,200,255,0.28)"/><stop offset="100%" stop-color="rgba(0,200,255,0)"/></linearGradient></defs>
  <rect width="${W}" height="${H}" fill="rgba(13,21,32,0.95)"/>
  ${yLabels.map(v=>{const y=py(v);return`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="${P.l-4}" y="${y+3.5}" fill="rgba(255,255,255,0.22)" font-size="8" text-anchor="end" font-family="monospace">${(v*100).toFixed(0)}%</text>`;}).join('')}
  <line x1="${P.l}" y1="${thY}" x2="${W-P.r}" y2="${thY}" stroke="rgba(255,59,92,0.45)" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="${W-P.r-2}" y="${thY-3}" fill="rgba(255,59,92,0.5)" font-size="8" text-anchor="end" font-family="monospace">68%</text>
  <polygon points="${areaPts}" fill="url(#shg)" opacity="0.8"/>
  <polyline points="${linePts}" fill="none" stroke="rgba(0,200,255,0.9)" stroke-width="1.5" stroke-linejoin="round"/>
</svg>`;
  }

  /* ── 히어로 아이콘 ─────────────────────────────────────────── */
  function heroIcon(cls) {
    if (cls === 'danger') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 21 6v6c0 5-3.6 8.6-9 10-5.4-1.4-9-5-9-10V6l9-4z"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>';
    if (cls === 'safe')   return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 21 6v6c0 5-3.6 8.6-9 10-5.4-1.4-9-5-9-10V6l9-4z"/><polyline points="8.5 12.5 11 15 15.5 9.5"/></svg>';
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 21 6v6c0 5-3.6 8.6-9 10-5.4-1.4-9-5-9-10V6l9-4z"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.75" fill="currentColor"/></svg>';
  }

  /* ── 메인 렌더 ─────────────────────────────────────────────── */
  function render(p) {
    const vm   = verdictMeta(p.verdict);
    const segs = p.suspiciousSegments || [];
    const scores = p.scores || [];
    const tc   = p.inputType || 'video';
    const tIcon = {video:'🎬', image:'🖼', url:'🔗'}[tc] || '📄';
    const tLabel = {video:'VIDEO', image:'IMAGE', url:'URL'}[tc] || 'FILE';
    const nameLabel = p.fileName
      ? `<span style="color:var(--clr-text-muted)">${escHtml(p.fileName)}</span>`
      : p.sourceUrl
        ? `<a href="${escHtml(p.sourceUrl)}" target="_blank" rel="noopener" style="color:var(--clr-accent);word-break:break-all">${escHtml(p.sourceUrl)}</a>`
        : '<span style="color:var(--clr-text-faint)">알 수 없음</span>';

    const shareUrl = location.href;
    const avgPct = (p.avgConfidence*100).toFixed(1);

    root.innerHTML = `
      <!-- Eyebrow -->
      <p class="share-eyebrow fade-up">
        <span>🔗 공유된 판별 결과</span>
        <span class="share-eyebrow__dot"></span>
        <span>${fmtDate(p.postedAt)}</span>
      </p>

      <!-- Hero -->
      <div class="share-hero share-hero--${vm.cls} fade-up">
        <div class="share-hero__icon">${heroIcon(vm.cls)}</div>
        <div class="share-hero__main">
          <p class="text-label mb-6">판별 결과</p>
          <h1 class="share-hero__verdict">${vm.label}</h1>
          <div class="share-hero__meta">
            <span class="share-type-chip">${tIcon} ${tLabel}</span>
            ${nameLabel}
          </div>
        </div>
        <div class="share-hero__confidence">
          <p class="text-label mb-6">딥페이크 신뢰도</p>
          <p class="share-hero__confidence-value">${avgPct}%</p>
          <div class="share-hero__confidence-bar"><div style="width:${avgPct}%"></div></div>
        </div>
      </div>

      <!-- 판별된 미디어 -->
      ${p.mediaData ? `
      <div class="media-box fade-up">
        <img src="${p.mediaData}" alt="판별 미디어" />
        <div class="media-box__caption">판별 당시 캡처된 미디어 — 원본 파일이 아닌 분석용 캡처 이미지입니다</div>
      </div>` : ''}

      <!-- 상세 지표 카드 -->
      <div class="card p-24 fade-up" style="margin-bottom:20px">
        <p class="share-section-title">상세 지표</p>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-item__label">최대 신뢰도</div>
            <div class="stat-item__value" style="color:${confColor(p.maxConfidence)}">${(p.maxConfidence*100).toFixed(1)}%</div>
          </div>
          <div class="stat-item">
            <div class="stat-item__label">분석 프레임</div>
            <div class="stat-item__value">${p.totalFrames ? p.totalFrames+' f' : '—'}</div>
          </div>
          <div class="stat-item">
            <div class="stat-item__label">의심 구간</div>
            <div class="stat-item__value" style="color:${segs.length?'var(--clr-danger)':'var(--clr-safe)'}">${segs.length}개</div>
          </div>
          <div class="stat-item">
            <div class="stat-item__label">입력 유형</div>
            <div class="stat-item__value">${tIcon} ${tLabel}</div>
          </div>
        </div>

        <!-- 신뢰도 타임라인 -->
        ${scores.length > 1 ? `
        <div style="margin-top:18px">
          <p class="share-section-title" style="margin-bottom:8px">신뢰도 타임라인</p>
          <div class="share-chart-wrap">${buildSparkline(scores)}</div>
          <p class="share-chart-note">점선: 딥페이크 판정 임계값 (68%)</p>
        </div>` : ''}
      </div>

      <!-- 메모 -->
      ${p.memo ? `
      <div class="card p-20 fade-up" style="margin-bottom:20px">
        <p class="share-section-title">공유자 코멘트</p>
        <p class="share-memo">${escHtml(p.memo)}</p>
      </div>` : ''}

      <!-- 위조 의심 구간 -->
      ${segs.length ? `
      <div class="card p-20 fade-up" style="margin-bottom:20px;border-color:var(--clr-danger)">
        <p class="share-section-title" style="color:var(--clr-danger)">위조 의심 구간 (${segs.length}개)</p>
        <div style="border:1px solid var(--clr-danger-dim);border-radius:6px;overflow:hidden">
          ${segs.map((s,i)=>`
          <div class="segment-item" style="border-radius:0;border-left:none;border-right:none;${i===0?'border-top:none;':''}${i===segs.length-1?'':'margin-bottom:-1px;'}">
            <span class="mono" style="font-size:.75rem;color:var(--clr-danger);min-width:24px">#${i+1}</span>
            <span class="segment-item__time">${fmtTime(s.startTime)} → ${fmtTime(s.endTime)}</span>
            <div class="segment-item__bar"><div class="segment-item__bar-fill" style="width:${s.avgConfidence*100}%"></div></div>
            <span class="segment-item__score">${(s.avgConfidence*100).toFixed(1)}%</span>
            <span class="badge badge--danger">FAKE</span>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <!-- 해시 -->
      ${p.hash ? `
      <div class="card p-16 fade-up" style="margin-bottom:20px">
        <p class="share-section-title">식별 해시</p>
        <p class="share-hash">${p.hash}</p>
      </div>` : ''}

      <!-- 공유 링크 복사 -->
      <div class="card p-20 fade-up" style="margin-bottom:20px">
        <p class="share-section-title">이 결과 공유하기</p>
        <div class="copy-link-row">
          <input id="copy-link-input" class="form-input" style="flex:1;font-size:.8125rem;font-family:var(--font-mono)" value="${shareUrl}" readonly />
          <button class="btn btn--primary btn--sm" onclick="
            navigator.clipboard.writeText(document.getElementById('copy-link-input').value)
              .then(()=>{ const b=this; b.textContent='복사됨 ✓'; setTimeout(()=>b.textContent='링크 복사',1800); })
              .catch(()=>{ document.getElementById('copy-link-input').select(); });
          ">링크 복사</button>
        </div>
      </div>

      <!-- 워터마크 -->
      <div class="share-watermark fade-up">
        <a href="./index.html" class="share-watermark__brand">
          <svg width="18" height="18" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#0a0e1a"/><path d="M16 6 L26 11 V17 C26 22 21 26 16 28 C11 26 6 22 6 17 V11 Z" fill="none" stroke="#00e5a0" stroke-width="2"/><circle cx="16" cy="18" r="3" fill="#00e5a0"/><line x1="16" y1="12" x2="16" y2="15" stroke="#00e5a0" stroke-width="2"/></svg>
          <span>DeepGuard Pro</span>
        </a>
        <p class="share-watermark__disclaimer">본 결과는 AI 기반 분석이며 법적 효력을 위해서는 전문가 검토가 필요합니다.</p>
        <div class="share-watermark__links">
          <a href="./index.html">새로 판별하기</a>
          <a href="./community.html">커뮤니티 보기</a>
        </div>
      </div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>

<script>
/* Mobile nav toggle */
(function() {
  var btn = document.getElementById('nav-hamburger');
  var drawer = document.getElementById('nav-mobile-drawer');
  if (!btn || !drawer) return;
  // Mark current page link active
  var links = drawer.querySelectorAll('a');
  links.forEach(function(a) {
    if (a.href.split('/').pop() === location.pathname.split('/').pop()) {
      a.classList.add('active');
    }
  });
  btn.addEventListener('click', function() {
    var open = drawer.classList.toggle('is-open');
    btn.classList.toggle('is-open', open);
    btn.setAttribute('aria-label', open ? '메뉴 닫기' : '메뉴 열기');
  });
  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!btn.contains(e.target) && !drawer.contains(e.target)) {
      drawer.classList.remove('is-open');
      btn.classList.remove('is-open');
    }
  });
})();
</script>
<script>
/* NHN Cloud theme toggle */
(function(){
  var btn=document.getElementById("theme-toggle-btn");
  if(!btn)return;
  btn.addEventListener("click",function(){
    var cur=document.documentElement.getAttribute("data-theme")||"dark";
    var next=cur==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",next);
    localStorage.setItem("dg_theme",next);
  });
})();
</script>
</body>
</html>
